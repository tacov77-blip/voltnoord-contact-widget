<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 72 72"
     width="72"
     height="72">

  <defs>

    <linearGradient id="voltGradient"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="100%">

      <stop offset="0%" stop-color="#ff7d2a"/>
      <stop offset="100%" stop-color="#ff5a00"/>

    </linearGradient>

    <filter id="shadow"
            x="-30%"
            y="-30%"
            width="160%"
            height="160%">

      <feDropShadow
          dx="0"
          dy="3"
          stdDeviation="3"
          flood-color="#ff5a00"
          flood-opacity=".28"/>

    </filter>

  </defs>

  <!-- Achtergrond -->

  <circle
      cx="36"
      cy="36"
      r="34"
      fill="url(#voltGradient)"
      filter="url(#shadow)"/>

  <!-- Linker kompasboog -->

  <path
      d="
      M31 12
      A24 24 0 0 0 12 36
      A24 24 0 0 0 31 60"
      fill="none"
      stroke="#fff"
      stroke-width="3.4"
      stroke-linecap="round"/>

  <!-- Rechter kompasboog -->

  <path
      d="
      M41 12
      A24 24 0 0 1 60 36
      A24 24 0 0 1 41 60"
      fill="none"
      stroke="#fff"
      stroke-width="3.4"
      stroke-linecap="round"/>

  <!-- Westpijl -->

  <path
      d="
      M12 36
      L18 33
      L18 39
      Z"
      fill="#fff"/>

  <!-- Oostpijl -->

  <path
      d="
      M60 36
      L54 33
      L54 39
      Z"
      fill="#fff"/>

<!-- Bovenste bliksem -->

<path
    d="
    M39 2
    L31 28
    L39 28
    L34 39
    Z"
    fill="#fff"/>

<!-- Onderste bliksem -->

<path
    d="
    M33 35
    L41 35
    L30 70
    L45 44
    Z"
    fill="#fff"/>

</svg>