<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Volt Noord Widget V2</title>

<link rel="stylesheet" href="widget.css">

</head>

<body>

<div class="demo">

    <div class="hero">

        <h1>Volt Noord</h1>

        <p>Lokale ontwikkelomgeving voor de contactwidget.</p>

    </div>

</div>

<!-- ===================================================== -->
<!-- VOLT NOORD WIDGET                                     -->
<!-- ===================================================== -->

<div id="volt-widget">

    <!-- Launcher -->

    <button id="volt-launcher" aria-label="Open widget">

        <!-- Tijdelijke launcher -->
        <!-- Wordt in fase 4 vervangen door SVG -->

        ⚡

    </button>

    <!-- Widget -->

    <div class="volt-card">

        <button class="volt-close" aria-label="Sluiten">

            ✕

        </button>

        <div class="volt-header">

    <div class="volt-brand">

        <img
            src="assets/header-icon.png"
            class="brand-icon"
            alt="Volt Noord">

        <div class="brand-text">

            <h3>Volt Noord</h3>

            <span>Elektrotechniek</span>

        </div>

    </div>

    <h2>Heeft u een storing?</h2>

    <p>

        Wij helpen u direct verder.

        Bel ons of stuur een WhatsApp.

    </p>

    <div class="volt-status">

        <span class="status-dot"></span>

        Bereikbaar 17:00-22:00

    </div>

</div>

        <div class="volt-actions">

            <a
                href="tel:0644513156"
                class="btn btn-primary">

                📞

                <span>Bel direct</span>

            </a>

            <a
                href="https://wa.me/31644513156"
                target="_blank"
                class="btn btn-secondary">

                💬

                <span>WhatsApp</span>

            </a>

        </div>

        <div class="volt-footer">

            Gemiddelde reactietijd ±15 minuten

        </div>

    </div>

</div>

<script src="widget-core.js"></script>

<script>
window.initVoltWidget();
</script>

</body>

</html>
